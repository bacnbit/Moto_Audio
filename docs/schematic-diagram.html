<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto Audio Unit — Interactive Schematic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; overflow-x: hidden; }

  h1 { text-align: center; padding: 20px; font-size: 1.6em; color: #fff; letter-spacing: 1px; }
  h1 span { color: #888; font-weight: 300; font-size: 0.7em; }

  .controls { text-align: center; padding: 0 20px 15px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .controls button {
    padding: 6px 14px; border: 1px solid #444; border-radius: 6px;
    background: #2a2a3e; color: #ccc; cursor: pointer; font-size: 0.85em; transition: all 0.2s;
  }
  .controls button:hover { background: #3a3a5e; color: #fff; }
  .controls button.active { background: #4a6fa5; border-color: #6a9fd5; color: #fff; }

  .legend { display: flex; gap: 16px; justify-content: center; padding: 0 20px 15px; flex-wrap: wrap; font-size: 0.8em; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch { width: 28px; height: 4px; border-radius: 2px; }

  svg { display: block; margin: 0 auto; }

  .component {
    cursor: pointer; transition: filter 0.2s, opacity 0.2s;
  }
  .component:hover { filter: brightness(1.3); }
  .component.dimmed { opacity: 0.15; }
  .component.highlighted { filter: brightness(1.2) drop-shadow(0 0 8px rgba(100,160,255,0.5)); }

  .comp-box { rx: 6; ry: 6; stroke-width: 2; }
  .comp-label { font-size: 11px; font-weight: 600; fill: #fff; text-anchor: middle; pointer-events: none; }
  .comp-sublabel { font-size: 9px; fill: #aaa; text-anchor: middle; pointer-events: none; }
  .comp-ref { font-size: 9px; fill: #888; text-anchor: middle; pointer-events: none; font-style: italic; }
  .pin-label { font-size: 7.5px; fill: #999; pointer-events: none; }
  .pin-dot { pointer-events: none; }

  .net-line { stroke-width: 2; fill: none; opacity: 0.7; transition: opacity 0.2s, stroke-width 0.2s; }
  .net-line.dimmed { opacity: 0.05; }
  .net-line.highlighted { opacity: 1; stroke-width: 3; }

  .net-label-bg { fill: #1a1a2e; opacity: 0.85; }
  .net-label { font-size: 8px; fill: #ccc; text-anchor: middle; pointer-events: none; }

  .section-label { font-size: 10px; fill: #555; text-anchor: middle; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
  .section-box { fill: none; stroke: #2a2a3e; stroke-width: 1; stroke-dasharray: 4 2; rx: 10; ry: 10; }

  #tooltip {
    position: fixed; display: none; background: #2a2a3e; border: 1px solid #4a6fa5;
    border-radius: 8px; padding: 12px 16px; max-width: 360px; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); font-size: 0.85em; line-height: 1.5;
  }
  #tooltip h3 { color: #6a9fd5; margin-bottom: 4px; font-size: 1em; }
  #tooltip .tt-ref { color: #888; font-size: 0.85em; }
  #tooltip .tt-pins { margin-top: 6px; }
  #tooltip .tt-pins table { border-collapse: collapse; width: 100%; }
  #tooltip .tt-pins td { padding: 2px 6px; border-bottom: 1px solid #333; font-size: 0.85em; }
  #tooltip .tt-pins td:first-child { color: #8ab4f8; font-family: monospace; }
  #tooltip .tt-net { color: #f0c040; font-family: monospace; font-size: 0.85em; }
</style>
</head>

// Tooltip
const tooltip = document.getElementById('tooltip');
const svg = document.getElementById('schematic');

document.querySelectorAll('.component[data-id]').forEach(el => {
  el.addEventListener('mouseenter', (e) => {
    const id = el.dataset.id;
    const data = componentData[id];
    if (!data) return;

    let pinRows = data.pins.map(p => `<tr><td>${p[0]}</td><td>${p[1]}</td></tr>`).join('');
    tooltip.innerHTML = `
      <h3>${data.name} <span class="tt-ref">${data.ref}</span></h3>
      <div>${data.desc}</div>
      <div style="margin-top:4px;color:#888;font-size:0.85em">Footprint: ${data.footprint}</div>
      <div class="tt-pins"><table>${pinRows}</table></div>
    `;
    tooltip.style.display = 'block';
    positionTooltip(e);
  });

  el.addEventListener('mousemove', positionTooltip);
  el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

  // Click to highlight connections
  el.addEventListener('click', () => {
    const id = el.dataset.id;
    const sections = (el.dataset.sections || '').split(',');

    const isAlreadyHighlighted = el.classList.contains('highlighted');

    // Reset all
    document.querySelectorAll('.component').forEach(c => c.classList.remove('dimmed', 'highlighted'));
    document.querySelectorAll('.net-line').forEach(n => n.classList.remove('dimmed', 'highlighted'));

    if (isAlreadyHighlighted) return; // toggle off

    // Dim everything
    document.querySelectorAll('.component[data-id]').forEach(c => c.classList.add('dimmed'));
    document.querySelectorAll('.net-line').forEach(n => n.classList.add('dimmed'));

    // Highlight this component
    el.classList.remove('dimmed');
    el.classList.add('highlighted');

    // Highlight connected nets
    document.querySelectorAll('.net-line').forEach(n => {
      const netSections = (n.dataset.sections || '').split(',');
      if (sections.some(s => netSections.includes(s))) {
        n.classList.remove('dimmed');
        n.classList.add('highlighted');
      }
    });

    // Highlight connected components
    document.querySelectorAll('.component[data-id]').forEach(c => {
      if (c === el) return;
      const cSections = (c.dataset.sections || '').split(',');
      if (sections.some(s => cSections.includes(s))) {
        c.classList.remove('dimmed');
        c.classList.add('highlighted');
      }
    });
  });
});

function positionTooltip(e) {
  let x = e.clientX + 15;
  let y = e.clientY + 15;
  if (x + 360 > window.innerWidth) x = e.clientX - 375;
  if (y + 300 > window.innerHeight) y = e.clientY - 310;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// Filter buttons
document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const filter = btn.dataset.filter;

    // Reset
    document.querySelectorAll('.component').forEach(c => c.classList.remove('dimmed', 'highlighted'));
    document.querySelectorAll('.net-line').forEach(n => n.classList.remove('dimmed', 'highlighted'));
    document.querySelectorAll('.net-label-group').forEach(n => n.style.opacity = '1');

    if (filter === 'all') return;

    // Dim non-matching
    document.querySelectorAll('.component[data-sections]').forEach(c => {
      const sections = c.dataset.sections.split(',');
      if (!sections.includes(filter)) {
        c.classList.add('dimmed');
      }
    });

    document.querySelectorAll('.net-line').forEach(n => {
      const sections = (n.dataset.sections || '').split(',');
      if (!sections.includes(filter)) {
        n.classList.add('dimmed');
      }
    });

    document.querySelectorAll('.net-label-group').forEach(n => {
      const sections = (n.dataset.sections || '').split(',');
      if (!sections.includes(filter)) {
        n.style.opacity = '0.1';
      }
    });
  });
});

// Click on SVG background to reset
svg.addEventListener('click', (e) => {
  if (e.target === svg || e.target.classList.contains('section-box') || e.target.classList.contains('section-label')) {
    document.querySelectorAll('.component').forEach(c => c.classList.remove('dimmed', 'highlighted'));
    document.querySelectorAll('.net-line').forEach(n => n.classList.remove('dimmed', 'highlighted'));
  }
});
